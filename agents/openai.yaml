interface:
  display_name: "Persona.skill"
  short_description: "蒸馏、验证并跨运行时管理可持续陪伴工作的角色人格 Skill"
  default_prompt: "使用 $persona 创建或管理角色人格；创建第一步必须完成名称闸门：有用户指定原名时先让用户选择 1 直接使用原角色名或 2 自定义角色名并等待输入，没有指定原名时先让用户直接设定人物名；名称未确认前禁止联网、初始化或蒸馏。创建启动后保持持续执行回应锁：任何 MUST_CONTINUE=true、FINAL_REPORT_ALLOWED=false 或 RESPONSE_MODE=CONTINUE_TOOL_LOOP 都只能继续工具循环，不能以阶段性进度结束或等待继续；名称确认、初始化、每轮资料采集、蒸馏、行为建模、后冻结隐藏场景实测、隔离盲评和启用核对后都要主动反馈阶段、已完成、数量或发现、下一步，但反馈不是暂停许可。新建人格使用人物资产 v3：至少 12 条 BEHAV 行为机制，实际 Runtime 生成至少 24 条隐藏场景连续回答，回答内逐字可见信号通过检查，并由不同上下文盲评；失败按资料、行为模型、检索、生成、运行时或评估层自动修复并重跑。只有 completion-gate 返回 RESPONSE_MODE=FINAL_REPORT、CREATE_LOOP_LOCK=released 和 TERMINAL_ALLOWED=true 才允许交付；不要停在初始化或进度汇报，也不要停在静态文件通过或自评分数。"
